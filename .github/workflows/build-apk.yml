name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update the rolling "continuous" release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper (if missing)
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.9
          fi
          chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: NewsRadar-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Delete old continuous release
        continue-on-error: true
        run: |
          gh release delete continuous --yes || true
          git push --delete origin continuous || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish rolling "continuous" release (always-downloadable APK)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: NewsRadar (latest build)
          prerelease: true
          files: app/build/outputs/apk/debug/app-debug.apk
